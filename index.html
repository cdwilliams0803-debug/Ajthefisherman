<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AJ The Fisherman – Fishing Videos</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Work+Sans:wght@100;400;600;800&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        html {
            background-color: #1a0a05;
            min-height: 100vh;
        }
        
        body {
            margin: 0;
            padding: 2rem 1.5rem;
            font-family: 'Work Sans', sans-serif;
            min-height: 100vh;
            position: relative;
            background: 
                /* Flannel pattern overlay */
                repeating-linear-gradient(45deg, rgba(180, 40, 30, 0.3), rgba(180, 40, 30, 0.3) 100px, transparent 0px, transparent 200px),
                repeating-linear-gradient(-45deg, rgba(100, 20, 15, 0.2), rgba(100, 20, 15, 0.2) 100px, transparent 0px, transparent 200px),
                /* Sunrise gradient background */
                radial-gradient(ellipse at 20% 15%, #ff6b35 0%, #d50000 40%, #8b1a1a 70%, #2a0a05 100%);
        }
        
        /* Fisherman Casting Silhouette - Background Element */
        body::before {
            content: "";
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            top: 0;
            pointer-events: none;
            z-index: 0;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600"><defs><linearGradient id="sunGrad" x1="0%" y1="100%" x2="0%" y2="0%"><stop offset="0%" style="stop-color:%23ff6b35;stop-opacity:0.4"/><stop offset="100%" style="stop-color:%23ffd700;stop-opacity:0.15"/></linearGradient></defs><circle cx="180" cy="200" r="120" fill="url(%23sunGrad)"/><g transform="translate(80, 280)" fill="%231a0a05" opacity="0.35"><ellipse cx="40" cy="50" rx="18" ry="28"/><circle cx="40" cy="18" r="12"/><ellipse cx="40" cy="10" rx="20" ry="6"/><rect x="28" y="4" width="24" height="10" rx="3"/><line x1="55" y1="35" x2="100" y2="10" stroke="%231a0a05" stroke-width="6" stroke-linecap="round"/><line x1="98" y1="12" x2="150" y2="50" stroke="%231a0a05" stroke-width="4" stroke-linecap="round"/><path d="M150 50 Q170 75 155 110" stroke="%23aaaaaa" stroke-width="1.5" fill="none" opacity="0.5"/><line x1="32" y1="75" x2="25" y2="110" stroke="%231a0a05" stroke-width="5" stroke-linecap="round"/><line x1="48" y1="75" x2="55" y2="110" stroke="%231a0a05" stroke-width="5" stroke-linecap="round"/></g><g transform="translate(620, 420)" fill="%231a0a05" opacity="0.3"><ellipse cx="40" cy="30" rx="35" ry="15"/><ellipse cx="40" cy="34" rx="28" ry="8" fill="%23c8d95a" opacity="0.5"/><polygon points="8,25 0,12 0,38" fill="%231a0a05"/><path d="M25 15 L32 3 L40 15" fill="%231a0a05"/><path d="M40 15 L48 4 L55 15" fill="%231a0a05"/><circle cx="60" cy="26" r="4" fill="white"/><circle cx="61" cy="26" r="2" fill="black"/><path d="M72 28 Q78 32 72 36" stroke="%231a0a05" stroke-width="2" fill="none"/><ellipse cx="48" cy="40" rx="8" ry="4" fill="%233a3a3a" transform="rotate(-20,48,40)"/><circle cx="20" cy="50" r="3" fill="%234a9eff" opacity="0.4"/><circle cx="35" cy="55" r="2" fill="%234a9eff" opacity="0.3"/><circle cx="55" cy="52" r="2.5" fill="%234a9eff" opacity="0.35"/><path d="M0 55 Q20 50 40 55 Q60 60 80 55" stroke="%234a9eff" stroke-width="2" fill="none" opacity="0.3"/></g></svg>');
            background-repeat: no-repeat;
            background-position: left bottom 20%;
            background-size: 60% 70%;
        }
        
        /* Second bass in different position */
        body::after {
            content: "";
            position: fixed;
            bottom: 0;
            right: 0;
            pointer-events: none;
            z-index: 0;
            width: 300px;
            height: 200px;
            background-image: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 150"><g transform="translate(10, 40)" fill="%231a0a05" opacity="0.25"><ellipse cx="50" cy="25" rx="40" ry="16"/><ellipse cx="50" cy="29" rx="32" ry="8" fill="%23c8d95a" opacity="0.4"/><polygon points="12,20 0,8 0,32" fill="%231a0a05"/><path d="M30 10 L38 0 L48 10" fill="%231a0a05"/><path d="M48 10 L58 1 L66 10" fill="%231a0a05"/><circle cx="75" cy="21" r="4" fill="white"/><circle cx="76" cy="21" r="2" fill="black"/><ellipse cx="58" cy="34" rx="9" ry="4" fill="%233a3a3a" transform="rotate(-20,58,34)"/><circle cx="25" cy="44" r="3" fill="%234a9eff" opacity="0.3"/><circle cx="45" cy="48" r="2" fill="%234a9eff" opacity="0.25"/><circle cx="70" cy="46" r="2.5" fill="%234a9eff" opacity="0.3"/></g></svg>');
            background-repeat: no-repeat;
            background-position: right bottom 15%;
            background-size: 200px 150px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.55);
            backdrop-filter: blur(2px);
            border-radius: 32px;
            padding: 2rem 1.8rem;
            border: 1px solid rgba(255, 200, 150, 0.2);
            position: relative;
            z-index: 1;
        }
        
        .hero { text-align: center; margin-bottom: 2rem; }
        
        h1 {
            background: #8b3a1f;
            border: 1px dashed #fff;
            padding: 1rem 3rem;
            outline: 5px solid #8b3a1f;
            color: #fff;
            text-shadow: 2px 2px #5a2512;
            font-weight: 800;
            font-size: 2.5rem;
            display: inline-block;
        }
        
        .tagline { color: #ffe6c7; margin-top: 0.8rem; }
        
        .featured {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 28px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255, 140, 70, 0.5);
        }
        
        .featured h2 { color: #ffddb0; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.6rem; font-size: 1.3rem; }
        .featured h2:before { content: "🎣"; }
        
        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            border-radius: 20px;
            background: #1a1a1a;
            border: 1px solid #d64531;
        }
        
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        
        .featured-desc {
            margin-top: 1rem;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            color: #e2cbaa;
        }
        
        .gear { background: rgba(0,0,0,0.6); padding: 0.3rem 1rem; border-radius: 30px; border-left: 3px solid #d64531; font-size: 0.8rem; }
        
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2rem;
            padding: 0.7rem;
            position: sticky;
            top: 0.5rem;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 60px;
            z-index: 10;
            border: 1px solid rgba(255, 100, 50, 0.5);
        }
        
        .filter-btn {
            background: none;
            border: 1px solid #c06242;
            color: #f2ddbc;
            padding: 0.5rem 1.4rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 0.85rem;
        }
        
        .filter-btn.active, .filter-btn:hover {
            background: #c53f28;
            color: #1e110a;
            border-color: #ffbc7a;
        }
        
        .search-wrap { text-align: center; margin-bottom: 2rem; }
        
        #searchInput {
            background: rgba(0,0,0,0.6);
            border: 1px solid #bf543a;
            padding: 0.7rem 1.2rem;
            width: 280px;
            border-radius: 60px;
            color: #f5e2c6;
            font-size: 1rem;
            outline: none;
            font-family: 'Work Sans', sans-serif;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        
        .video-card {
            background: rgba(0, 0, 0, 0.65);
            border-radius: 20px;
            overflow: hidden;
            transition: transform 0.2s;
            border: 1px solid #b55a3e;
            cursor: pointer;
        }
        
        .video-card:hover { transform: translateY(-5px); border-color: #e07656; }
        
        .thumb {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            border-bottom: 2px solid #c54228;
        }
        
        .card-content { padding: 0.8rem; }
        .video-title { font-weight: 600; color: #f7e2c5; font-size: 0.9rem; margin-bottom: 0.3rem; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .video-meta { display: flex; justify-content: space-between; font-size: 0.7rem; color: #c9a979; margin-top: 0.3rem; }
        .species-badge { background: #5c2a1a; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.6rem; color: #fcd7a8; }
        .no-results, .loading-spinner { text-align: center; color: #e2c9a8; grid-column: 1/-1; padding: 2rem; }
        
        footer {
            text-align: center;
            margin-top: 2rem;
            color: #bf8e68;
            border-top: 1px solid #bc553c;
            padding-top: 1.5rem;
            font-size: 0.8rem;
        }
        
        @media (max-width: 650px) {
            body { padding: 1rem; }
            .container { padding: 1rem; }
            h1 { font-size: 1.6rem; padding: 0.6rem 1.5rem; }
            .filter-btn { padding: 0.3rem 1rem; font-size: 0.7rem; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🐟 AJ The Fisherman</h1>
        <div class="tagline">Tight Lines Every Cast</div>
    </div>

    <div class="featured" id="featuredSection">
        <h2>Latest Catch</h2>
        <div class="video-container" id="featuredVideoContainer">
            <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; text-align: center;">Loading videos...</div>
        </div>
        <div class="featured-desc">
            <span id="featuredTitle">Loading latest video...</span>
            <span class="gear" id="featuredGear">⚙️ AJ The Fisherman</span>
        </div>
    </div>

    <div class="filter-bar" id="filterBar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="bass">Bass</button>
        <button class="filter-btn" data-filter="trout">Trout</button>
        <button class="filter-btn" data-filter="saltwater">Saltwater</button>
    </div>
    
    <div class="search-wrap">
        <input type="text" id="searchInput" placeholder="🔍 Search videos...">
    </div>

    <div class="video-grid" id="videoGrid">
        <div class="loading-spinner">🎣 Pulling all videos from AJ The Fisherman...</div>
    </div>
    
    <footer>
        🎣 All videos from <a href="https://www.youtube.com/@AJthefishermen" target="_blank" style="color: #e2cbaa;">@AJthefishermen</a> • New uploads appear automatically
    </footer>
</div>

<script>
    const API_KEY = 'AIzaSyAjg6QgU6J_M9DgwxkNuJHsXewdD7McjOs';
    const CHANNEL_ID = 'UCuCoh2EooGpfqXvrI6ZhW0g';
    
    let allVideos = [];
    let currentFilter = "all";
    let searchTerm = "";
    
    async function fetchAllVideos() {
        try {
            const channelUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${CHANNEL_ID}&key=${API_KEY}`;
            const channelRes = await fetch(channelUrl);
            const channelData = await channelRes.json();
            
            if (!channelData.items || channelData.items.length === 0) {
                console.error('Channel not found');
                return [];
            }
            
            const uploadsPlaylistId = channelData.items[0].contentDetails.relatedPlaylists.uploads;
            
            let allVideosData = [];
            let nextPageToken = null;
            
            do {
                let playlistUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=snippet&maxResults=50&playlistId=${uploadsPlaylistId}&key=${API_KEY}`;
                if (nextPageToken) {
                    playlistUrl += `&pageToken=${nextPageToken}`;
                }
                
                const playlistRes = await fetch(playlistUrl);
                const playlistData = await playlistRes.json();
                
                if (playlistData.items) {
                    allVideosData = [...allVideosData, ...playlistData.items];
                }
                
                nextPageToken = playlistData.nextPageToken;
            } while (nextPageToken);
            
            const videoIds = allVideosData.map(item => item.snippet.resourceId.videoId).join(',');
            const statsUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds}&key=${API_KEY}`;
            const statsRes = await fetch(statsUrl);
            const statsData = await statsRes.json();
            
            const viewCountMap = {};
            if (statsData.items) {
                statsData.items.forEach(item => {
                    viewCountMap[item.id] = item.statistics.viewCount;
                });
            }
            
            const videos = allVideosData.map((item, index) => {
                const videoId = item.snippet.resourceId.videoId;
                const title = item.snippet.title;
                
                return {
                    id: index,
                    title: title,
                    videoId: videoId,
                    thumbnail: item.snippet.thumbnails.high?.url || item.snippet.thumbnails.medium?.url,
                    publishedAt: item.snippet.publishedAt,
                    views: viewCountMap[videoId] ? parseInt(viewCountMap[videoId]).toLocaleString() : 'N/A',
                    species: detectSpecies(title)
                };
            });
            
            return videos;
            
        } catch (error) {
            console.error('API Error:', error);
            return [];
        }
    }
    
    function detectSpecies(title) {
        const lowerTitle = title.toLowerCase();
        if (lowerTitle.includes('bass')) return 'bass';
        if (lowerTitle.includes('trout')) return 'trout';
        if (lowerTitle.includes('salt') || lowerTitle.includes('redfish') || lowerTitle.includes('striper')) return 'saltwater';
        return 'bass';
    }
    
    function formatDate(dateString) {
        if (!dateString) return 'New';
        try {
            const date = new Date(dateString);
            return date.toLocaleDateString();
        } catch {
            return 'New';
        }
    }
    
    function formatViews(views) {
        if (!views || views === 'N/A') return '🎣 New';
        if (views >= 1000000) return (views / 1000000).toFixed(1) + 'M views';
        if (views >= 1000) return (views / 1000).toFixed(1) + 'K views';
        return views + ' views';
    }
    
    function playVideo(videoId, title) {
        const container = document.getElementById('featuredVideoContainer');
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${videoId}?autoplay=1" title="${title}" allowfullscreen></iframe>`;
        document.getElementById('featuredTitle').innerHTML = `🎣 ${escapeHtml(title)}`;
        document.querySelector('.featured').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    
    function renderFeatured(video) {
        if (!video) return;
        const container = document.getElementById('featuredVideoContainer');
        container.innerHTML = `<iframe src="https://www.youtube.com/embed/${video.videoId}?autoplay=1" title="${video.title}" allowfullscreen></iframe>`;
        document.getElementById('featuredTitle').innerHTML = `🎣 ${escapeHtml(video.title)}`;
        document.getElementById('featuredGear').innerHTML = `⚙️ AJ The Fisherman • ${formatViews(video.views)}`;
    }
    
    function renderGrid() {
        const grid = document.getElementById('videoGrid');
        
        let filtered = allVideos.filter(video => {
            const matchesFilter = currentFilter === 'all' || video.species === currentFilter;
            const matchesSearch = video.title.toLowerCase().includes(searchTerm.toLowerCase());
            return matchesFilter && matchesSearch;
        });
        
        if (filtered.length === 0) {
            grid.innerHTML = '<div class="no-results">🎣 No videos match your search</div>';
            return;
        }
        
        grid.innerHTML = filtered.map(video => `
            <div class="video-card" onclick="playVideo('${video.videoId}', '${escapeHtml(video.title)}')">
                <img class="thumb" src="${video.thumbnail}" alt="${escapeHtml(video.title)}" loading="lazy" onerror="this.src='https://img.youtube.com/vi/${video.videoId}/mqdefault.jpg'">
                <div class="card-content">
                    <div class="video-title">${escapeHtml(video.title)}</div>
                    <div class="video-meta">
                        <span class="species-badge">🎣 ${video.species.charAt(0).toUpperCase() + video.species.slice(1)}</span>
                        <span>📅 ${formatDate(video.publishedAt)}</span>
                    </div>
                    <div class="video-meta">
                        <span>👁️ ${formatViews(video.views)}</span>
                    </div>
                </div>
            </div>
        `).join('');
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    async function loadVideos() {
        const grid = document.getElementById('videoGrid');
        grid.innerHTML = '<div class="loading-spinner">🎣 Pulling all videos from AJ The Fisherman...</div>';
        
        allVideos = await fetchAllVideos();
        
        if (allVideos.length === 0) {
            grid.innerHTML = `
                <div class="no-results">
                    🎣 Unable to load videos. Please check your API key.<br><br>
                    <a href="https://www.youtube.com/@AJthefishermen/videos" target="_blank" style="color:#ffddb0;">Watch all videos on YouTube →</a>
                </div>
            `;
            return;
        }
        
        allVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
        
        renderFeatured(allVideos[0]);
        renderGrid();
        
        console.log(`✅ Loaded ${allVideos.length} videos from AJ The Fisherman`);
    }
    
    document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            this.classList.add('active');
            currentFilter = this.getAttribute('data-filter');
            renderGrid();
        });
    });
    
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', (e) => {
            searchTerm = e.target.value;
            renderGrid();
        });
    }
    
    loadVideos();
</script>
</body>
</html>
